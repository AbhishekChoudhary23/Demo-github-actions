name: Node & Docker CI Pipeline

# Trigger this workflow on every push or pull request to the main branch
on:
  push:
    branches: 
      - main
      - prod
  pull_request:
    branches: 
      - main
      - prod

jobs:
# JOB 1: Test and Validate the Node app
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository code
        uses: actions/checkout@v7
      
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: install dependencies
        run: npm ci

      - name: Verify application starts up
        run: node -e "require('express'); console.log('Dependencies verified successfully!')"

# JOB 2: Build the Docker Image (Only runs if Job 1 passes)
  build-docker:
    needs: test-and-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository code
        uses: actions/checkout@v7

      - name: Get current date and time
        id: datetime
        run: echo "TIMESTAMP=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Convert repository name to lowercase
        run: |
          echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Automatically uses your GitHub username
          password: ${{ secrets.GITHUB_TOKEN }} # Automatically generated secure token

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image locally to verify Dockerfile
        uses: docker/build-push-action@v6
        with:
          context:
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWERCASE }}:${{ env.TIMESTAMP }}
            ghcr.io/${{ env.REPO_LOWERCASE }}:${{ github.ref_name }}